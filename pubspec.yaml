name: app_scheduler
description: Schedule apps to launch at specific times
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive_flutter: ^1.1.0
  freezed_annotation: ^2.4.1
#  json_annotation: ^4.9.0
#  android_alarm_manager_plus: ^4.0.3
  uuid: ^4.4.0
  intl: ^0.19.0
  google_fonts: ^8.0.2
  r_icon_pro: ^1.0.3
  flutter_launcher_icons: ^0.14.4


dev_dependencies:
  flutter_test:
    sdk: flutter
#  build_runner: ^2.4.9
#  freezed: ^2.5.2
#  hive_generator: ^2.0.1
#  json_serializable: ^6.8.0
#  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  background_color: "#FF8152"
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#FF8152"
    theme_color: "#FF8152"
